<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚂 УзЖД Монитор</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0e17; --bg-card: rgba(17,24,39,0.7); --bg-glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08); --accent: #06b6d4; --accent2: #8b5cf6;
            --err: #ef4444; --grad: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            --t1: #f1f5f9; --t2: #94a3b8; --t3: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow-x: hidden; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--t1); min-height: 100vh; }

        .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(6,182,212,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.08) 0%, transparent 50%);
            animation: bg 20s ease-in-out infinite;
        }
        @keyframes bg { 0%,100%{transform:translate(0) scale(1)} 50%{transform:translate(-2%,-2%) scale(1.02)} }

        .wrap { position: relative; z-index: 1; max-width: 440px; margin: 0 auto; padding: 16px 16px 32px; }

        /* Header */
        .hdr { text-align: center; margin-bottom: 24px; animation: sDown .6s ease-out; }
        @keyframes sDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .logo-ico { width: 48px; height: 48px; background: var(--grad); border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 0 60px rgba(6,182,212,.15); }
        .logo-t { font-size: 20px; font-weight: 700; background: var(--grad);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-s { font-size: 12px; color: var(--t2); }
        .hdr-d { color: var(--t3); font-size: 13px; }

        /* Card */
        .card { background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 14px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.5); animation: cUp .5s ease-out backwards; }
        .card:nth-child(2){animation-delay:.1s} .card:nth-child(3){animation-delay:.2s}
        @keyframes cUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        .c-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .c-ico { width: 40px; height: 40px; background: var(--bg-glass); border: 1px solid var(--border);
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .c-title { font-size: 15px; font-weight: 600; }
        .c-sub { font-size: 11px; color: var(--t3); }

        /* Popular routes */
        .pop-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .pop-btn { flex: 1 1 calc(50% - 4px); min-width: 140px;
            padding: 12px; background: var(--bg-glass); border: 1px solid var(--border);
            border-radius: 12px; color: var(--t2); font-family: 'Outfit'; font-size: 13px;
            cursor: pointer; transition: all .2s; text-align: center; font-weight: 500; }
        .pop-btn:hover, .pop-btn:active { border-color: var(--accent); color: var(--t1);
            background: rgba(6,182,212,.08); }
        .pop-btn .pop-arrow { color: var(--accent); font-size: 11px; }

        /* Form */
        .fg { margin-bottom: 14px; }
        .fl { display: block; font-size: 12px; font-weight: 500; color: var(--t2); margin-bottom: 6px; }
        .sel-w { position: relative; }
        .sel-w::after { content:'\25BC'; position:absolute; right:14px; top:50%; transform:translateY(-50%);
            font-size:9px; color:var(--t3); pointer-events:none; }
        select, input[type="date"] { width: 100%; padding: 12px 14px; background: var(--bg-glass);
            border: 1px solid var(--border); border-radius: 12px; color: var(--t1);
            font-family: 'Outfit'; font-size: 14px; appearance: none; transition: all .3s; }
        select:focus, input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(6,182,212,.1); }
        select.err { border-color: var(--err); }
        select option { background: #111827; color: var(--t1); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1) opacity(.5); cursor:pointer; }

        .err-msg { display:none; font-size:11px; color:var(--err); margin-top:4px; }
        .err-msg.vis { display:block; }

        /* Route preview */
        .rp { display:none; align-items:center; gap:10px; padding:12px; margin-top:12px;
            background:var(--bg-glass); border:1px solid var(--border); border-radius:12px; }
        .rp.vis { display:flex; animation: cUp .3s ease-out; }
        .rp-st { flex:1; text-align:center; }
        .rp-l { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:1px; }
        .rp-n { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .rp-arr { color:var(--accent); font-size:16px; }

        /* Swap */
        .swap { width:36px; height:36px; background:var(--bg-glass); border:1px solid var(--border);
            border-radius:50%; color:var(--accent); font-size:16px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; margin:-2px auto 10px;
            transition:all .3s; }
        .swap:hover { background:rgba(6,182,212,.1); transform:rotate(180deg); }

        /* Info */
        .info { display:flex; align-items:flex-start; gap:10px; padding:12px; margin-top:12px;
            background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.2); border-radius:12px; }
        .info-ico { font-size:16px; flex-shrink:0; }
        .info-txt { font-size:12px; color:var(--t2); line-height:1.4; }

        /* Submit */
        .sub { width:100%; padding:16px; background:var(--grad); border:none; border-radius:14px;
            color:#fff; font-family:'Outfit'; font-size:15px; font-weight:600; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:8px;
            box-shadow:0 10px 40px rgba(6,182,212,.3); position:relative; overflow:hidden;
            transition:all .3s; }
        .sub:hover { transform:translateY(-2px); box-shadow:0 15px 50px rgba(6,182,212,.4); }
        .sub:disabled { opacity:.5; cursor:not-allowed; transform:none; }
        .sub.ld .bt { opacity:0; }
        .sub.ld .sp { display:block; }
        .sp { display:none; position:absolute; width:22px; height:22px; border:3px solid rgba(255,255,255,.3);
            border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        @media(max-width:360px) { .wrap{padding:12px 12px 24px} .card{padding:16px} .pop-btn{min-width:120px} }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="wrap">
        <header class="hdr">
            <div class="logo">
                <div class="logo-ico">🚂</div>
                <div><div class="logo-t">УзЖД Монитор</div><div class="logo-s">Рейс қидириш</div></div>
            </div>
            <p class="hdr-d">Йўналиш ва сана танланг</p>
        </header>

        <!-- Popular routes -->
        <div class="card">
            <div class="c-hdr">
                <div class="c-ico">⚡</div>
                <div><div class="c-title">Машҳур йўналишлар</div><div class="c-sub">Бир босишда</div></div>
            </div>
            <div class="pop-grid" id="popGrid"></div>
        </div>

        <!-- Route -->
        <div class="card">
            <div class="c-hdr">
                <div class="c-ico">🚉</div>
                <div><div class="c-title">Йўналиш</div><div class="c-sub">Ёки ўзингиз танланг</div></div>
            </div>
            <div class="fg">
                <label class="fl">Қайердан</label>
                <div class="sel-w"><select id="from"><option value="">Танланг...</option></select></div>
            </div>
            <button type="button" class="swap" id="swap">⇅</button>
            <div class="fg">
                <label class="fl">Қаёққа</label>
                <div class="sel-w"><select id="to"><option value="">Танланг...</option></select></div>
                <div class="err-msg" id="sameErr">⚠ Бир хил станция</div>
            </div>
            <div class="rp" id="rp">
                <div class="rp-st"><div class="rp-l">Кетиш</div><div class="rp-n" id="rpF">-</div></div>
                <div class="rp-arr">🚂 →</div>
                <div class="rp-st"><div class="rp-l">Келиш</div><div class="rp-n" id="rpT">-</div></div>
            </div>
        </div>

        <!-- Date -->
        <div class="card">
            <div class="c-hdr">
                <div class="c-ico">📅</div>
                <div><div class="c-title">Сана</div><div class="c-sub">Қачон?</div></div>
            </div>
            <div class="fg">
                <label class="fl">Сафар санаси</label>
                <input type="date" id="date" required>
            </div>
            <div class="info">
                <span class="info-ico">💡</span>
                <span class="info-txt">Билетлар 45 кун олдин сотувга чиқади</span>
            </div>
        </div>

        <button type="button" class="sub" id="sub" disabled>
            <span class="sp"></span>
            <span class="bt">🔍 Рейсларни кўрсатиш</span>
        </button>
    </div>

    <script>
        const ST = {
            "2900000":"Тошкент","2900001":"Тошкент-Жанубий","2900790":"Самарқанд",
            "2900930":"Бухоро","2900970":"Хива","2900950":"Урганч","2900800":"Қарши",
            "2900850":"Термиз","2900700":"Навоий","2900600":"Жиззах","2900400":"Фарғона",
            "2900450":"Андижон","2900500":"Наманган","2900300":"Қўқон","2900100":"Гулистон",
            "2900980":"Нукус","2900960":"Кунград","2900660":"Даштобод","2900782":"Зарафшон",
            "2900200":"Сирдарё","2900750":"Каттақўрғон","2900820":"Шаҳрисабз"
        };
        const POP = [
            ["2900000","2900790"], ["2900790","2900000"],
            ["2900000","2900930"], ["2900000","2900970"],
            ["2900000","2900400"], ["2900000","2900500"],
        ];

        const $=id=>document.getElementById(id);
        const fr=$('from'), to=$('to'), dt=$('date'), sub=$('sub'),
              sameErr=$('sameErr'), rp=$('rp'), rpF=$('rpF'), rpT=$('rpT');

        const tg=window.Telegram?.WebApp;
        if(tg){tg.ready();tg.expand();tg.BackButton.show();tg.BackButton.onClick(()=>tg.close());}
        const hap=()=>{try{tg?.HapticFeedback?.selectionChanged()}catch{}};

        // Popular routes
        const pg=$('popGrid');
        POP.forEach(([f,t])=>{
            const btn=document.createElement('button');
            btn.className='pop-btn';
            btn.innerHTML=`${ST[f]} <span class="pop-arrow">→</span> ${ST[t]}`;
            btn.onclick=()=>{
                fr.value=f; to.value=t; updRoute(); validate(); hap();
                // Scroll to date
                dt.scrollIntoView({behavior:'smooth',block:'center'});
                dt.focus();
            };
            pg.appendChild(btn);
        });

        // Stations
        const sorted=Object.entries(ST).sort((a,b)=>a[1].localeCompare(b[1],'uz'));
        sorted.forEach(([c,n])=>{fr.add(new Option(n,c));to.add(new Option(n,c));});

        // Date
        const today=new Date();
        const minD=new Date(today);minD.setDate(minD.getDate()+1);
        const maxD=new Date(today);maxD.setDate(maxD.getDate()+45);
        const fmt=d=>d.toISOString().split('T')[0];
        dt.min=fmt(minD);dt.max=fmt(maxD);dt.value=fmt(minD);

        function updRoute(){
            if(fr.value&&to.value&&fr.value!==to.value){
                rpF.textContent=fr.options[fr.selectedIndex].text;
                rpT.textContent=to.options[to.selectedIndex].text;
                rp.classList.add('vis');
            }else{rp.classList.remove('vis');}
        }
        function validate(){
            const same=fr.value&&to.value&&fr.value===to.value;
            sameErr.classList.toggle('vis',same);
            to.classList.toggle('err',same);
            const ok=fr.value&&to.value&&dt.value&&!same;
            sub.disabled=!ok;
            return ok;
        }

        $('swap').addEventListener('click',()=>{
            const tmp=fr.value;fr.value=to.value;to.value=tmp;
            updRoute();validate();hap();
        });
        fr.addEventListener('change',()=>{updRoute();validate();hap();});
        to.addEventListener('change',()=>{updRoute();validate();hap();});
        dt.addEventListener('change',validate);

        sub.addEventListener('click',()=>{
            if(!validate())return;
            const data={
                from_station:fr.value,
                from_station_name:fr.options[fr.selectedIndex].text,
                to_station:to.value,
                to_station_name:to.options[to.selectedIndex].text,
                date:dt.value,
            };
            if(tg){
                sub.classList.add('ld');sub.disabled=true;
                try{tg.HapticFeedback?.notificationOccurred('success');}catch{}
                tg.sendData(JSON.stringify(data));
            }else{
                console.log(data);
                sub.classList.add('ld');
                setTimeout(()=>{sub.classList.remove('ld');alert(JSON.stringify(data,null,2));},800);
            }
        });

        validate();
    </script>
</body>
</html>
